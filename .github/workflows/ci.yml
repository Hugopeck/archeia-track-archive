name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Archeia skill distributions are synced
        run: bash scripts/sync-skills.sh --check

      - name: Validate Track state
        run: bash scripts/track-validate.sh
