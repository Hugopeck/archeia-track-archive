name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint dependencies
        run: pip install pyyaml

      - name: Verify skill distributions are synced
        run: bash scripts/sync-skills.sh --check

      - name: Validate .track files
        run: python3 tools/track-lint.py

      - name: Run Track lint tests
        run: python3 tools/tests/test_track_lint.py
