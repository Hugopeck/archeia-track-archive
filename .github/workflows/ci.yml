name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sync-check:
    name: Archeia Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Archeia skill distributions are synced
        run: bash scripts/sync-skills.sh --check
